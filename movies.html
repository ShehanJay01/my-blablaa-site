<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movies</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="https://i.postimg.cc/nLdZJ80H/mooov.png">
  <style>
  body {
  margin: 0;
  padding: 20px;
  font-family: Nunito, sans-serif;
  background-color: #141414;
  color: white;
  position: relative;
  z-index: 1;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.postimg.cc/52kKQK0P/netflix-image.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(0px);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(20, 20, 20, 0.7));
  z-index: -1;
}

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }

    #buttonBar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .back-btn {
      background-color: #00ffff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .back-btn:hover {
      background-color: #00ffff;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .movie-card {
      background-color: #1f1f1f;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .movie-card:hover {
      transform: scale(1.05);
    }

    .movie-card img {
      width: 100%;
      height: auto;
    }

    .movie-card h3 {
      font-size: 16px;
      margin: 10px 0 5px;
    }

    .movie-card p {
      font-size: 14px;
      margin: 0 0 10px;
      color: #aaa;
    }

    .spinner {
      border: 8px solid #333;
      border-top: 8px solid #00ffff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .button-container {
      text-align: center;
      margin-top: 20px;
    }

    #backToTopFloating {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: none;
      background-color: #00ffff;
      color: white;
      border: none;
      padding: 10px 15px;
      font-size: 0.9em;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    #backToTopFloating:hover {
      background-color: #00ffff;
    }
  </style>
</head>
<body>

  <h1>Movies</h1>

  <div id="results"></div>
  <div id="spinner" class="spinner" style="display:none;"></div>

  <div class="button-container">
    <button class="back-btn" onclick="loadMore()">Load More</button>
  </div>

  <button id="backToTopFloating" onclick="scrollToTop()">↑</button>



 <script>
   
    // Example: https://YOUR_WORKER_SUBDOMAIN.YOUR_USERNAME.workers.dev/
    const WORKER_BASE_URL = 'https://movies.mooov.online'; 
    const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';
    let currentPage = 1;
    let isLoading = false; // Flag to prevent multiple concurrent fetches

    // Function to fetch movies from your Cloudflare Worker
    async function fetchMovies(page = 1) {
        if (isLoading) return; // Prevent fetching if already loading
        isLoading = true;

        const spinner = document.getElementById('spinner');
        if (spinner) { // Check if spinner element exists
            spinner.style.display = 'block';
        }

        try {
            // Construct the URL for your Cloudflare Worker
            const workerApiUrl = `${WORKER_BASE_URL}/movie/popular?language=en-US&page=${page}`;
            console.log('Fetching from Worker:', workerApiUrl); // Debugging: log the URL being fetched

            const response = await fetch(workerApiUrl);

            if (!response.ok) {
                const errorText = await response.text();
                console.error(`Error fetching movies: ${response.status} - ${errorText}`);
                alert(`Failed to load movies. Server error: ${response.status}. Details: ${errorText}. Please try again later.`);
                return;
            }

            const data = await response.json();
            displayMovies(data.results);
        } catch (error) {
            console.error('Network or parsing error fetching movies:', error);
            alert('Could not connect to the movie database. Please check your internet connection or try again later.');
        } finally {
            if (spinner) {
                spinner.style.display = 'none';
            }
            isLoading = false;
        }
    }

    // Function to display movies by appending them to the results container
    function displayMovies(movies) {
        const results = document.getElementById('results');
        if (!results) {
            console.error("Element with ID 'results' not found.");
            return;
        }

        movies.forEach(movie => {
            const card = document.createElement('div');
            card.classList.add('movie-card'); // Ensure you have CSS for this class

            const img = document.createElement('img');
            img.src = movie.poster_path ? IMAGE_BASE_URL + movie.poster_path : 'https://via.placeholder.com/200x300?text=No+Image'; // Better fallback
            img.alt = movie.title || 'Movie Poster';
            img.loading = 'lazy'; // Improve performance by lazy-loading images

            const title = document.createElement('h3');
            title.textContent = movie.title || 'Unknown Title';

            const date = document.createElement('p');
            date.textContent = movie.release_date ? `Release: ${movie.release_date}` : 'Release Date Unknown'; // Add "Release:" prefix

            card.appendChild(img);
            card.appendChild(title);
            card.appendChild(date);

            // Set the redirect behavior on click
            card.onclick = () => {
                const currentCategory = 'movie'; // Hardcoded as 'movie' for this popular movies page
                window.location.href = `movie?id=${movie.id}&type=${currentCategory}`; //.html removed
            };

            results.appendChild(card);
        });
    }

    // Function to load more movies (increments page and fetches)
    function loadMore() {
        currentPage++;
        fetchMovies(currentPage);
    }

    // Function to scroll back to the top of the page
    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Function to navigate back in browser history
    function goBack() {
        if (history.length > 1) {
            history.back();
        } else {
            alert("No previous page in history to go back to.");
        }
    }

    // Event listener for scroll to show/hide back-to-top button
    window.onscroll = function () {
        const btn = document.getElementById('backToTopFloating');
        if (btn) {
            if (document.documentElement.scrollTop > 300) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }
    };

    // Initial load of movies when the page loads
    document.addEventListener('DOMContentLoaded', () => {
        fetchMovies();
    });
</script>

</body>
</html>
