name: Generate XML Sitemap

on:
  schedule:
    - cron: '0 0 * * *' # සෑම දිනකම මධ්‍යම රාත්‍රියේ run වේ
  workflow_dispatch: # ඔබට අවශ්‍ය වෙලාවක manual run කිරීමට

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v2 වෙනුවට v4 භාවිතා කරන්න (Node.js 24 support කරයි)

      - name: Set up Python
        uses: actions/setup-python@v5 # v2 වෙනුවට v5 භාවිතා කරන්න
        with:
          python-version: '3.x' # 'python-code' වෙනුවට 'python-version' ලෙස නිවැරදි කරන්න

      - name: Install dependencies
        run: pip install requests

      - name: Run sitemap script
        run: python generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sitemap" && git push)
