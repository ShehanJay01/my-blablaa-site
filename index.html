   <script>
    // --- TMDB API Configuration ---
    // REMOVED: const TMDB_API_KEY = ''; // Your TMDB API key
    // Use your Cloudflare Worker as the base URL for API calls
    const WORKER_BASE_URL = 'https://indx.mooov.online'; // <<<--- YOUR WORKER URL
    const TMDB_IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/';

    // API Endpoints for different content categories
    // These will now be relative paths that your worker will forward
    const POPULAR_MOVIES_ENDPOINT = `/movie/popular`;
    const TRENDING_MOVIES_ENDPOINT = `/trending/movie/week`;
    const POPULAR_TV_ENDPOINT = `/tv/popular`;
    const NEW_RELEASES_ENDPOINT = `/movie/now_playing`;
    const TOP_RATED_MOVIES_ENDPOINT = `/movie/top_rated`;
    const TOP_RATED_TV_ENDPOINT = `/tv/top_rated`;
    const SEARCH_ENDPOINT = `/search/multi`; // For searching both movies and TV

    // --- DOM Elements ---
    const heroSlideshow = document.getElementById('hero-slideshow');
    const slideshowTitle = document.getElementById('slideshow-title');
    const slideshowDescription = document.getElementById('slideshow-description');
    const slideshowWatchNowBtn = document.getElementById('slideshow-watch-now-btn');
    const trendingMoviesGrid = document.getElementById('trending-movies-grid');
    const popularMoviesContainer = document.getElementById('popular-movies');
    const popularTvContainer = document.getElementById('popular-tv');
    const newReleasesContainer = document.getElementById('new-releases');
    const topRatedMoviesContainer = document.getElementById('top-rated-movies');
    const topRatedTvContainer = document.getElementById('top-rated-tv');

    // Search Bar Elements (Desktop)
    const searchInput = document.getElementById('search-input');
    const searchButton = document.getElementById('search-button');
    const browseButtons = document.querySelectorAll('.browse-button'); // Select all desktop browse buttons

    // Mobile Menu Elements
    const menuToggle = document.querySelector('.menu-toggle');
    const sideMenu = document.getElementById('sideMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuSearchInput = document.getElementById('menu-search-input');
    const menuSearchButton = document.getElementById('menu-search-button');
    const menuBrowseButtons = document.querySelectorAll('#sideMenu .browse-button'); // Select mobile menu browse buttons

    // --- Slideshow Variables ---
    let popularMoviesSlides = [];
    let currentSlideIndex = 0;
    let slideshowInterval;
    const SLIDESHOW_DURATION = 8000; // 8 seconds per slide

    // --- Search Category Variable ---
    let currentSearchType = 'movie'; // Default search type for both desktop and mobile search bars

    // --- Helper Functions ---

    /**
     * Fetches data from a given URL.
     * @param {string} url - The URL to fetch from.
     * @returns {Promise<object>} - The JSON response, or null if an error occurs.
     */
    async function fetchData(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error('Error fetching data:', error);
            return null;
        }
    }

    /**
     * Renders a single slide in the hero section.
     * Updates background image, title, and description.
     * @param {object} item - The movie or TV show object from TMDB.
     */
    function renderSlide(item) {
        // Construct backdrop image URL, with a fallback if not available
        const backdropPath = item.backdrop_path ? `${TMDB_IMAGE_BASE_URL}w1280${item.backdrop_path}` : 'https://i.postimg.cc/d15mp6sz/Image-Not-Available.jpg';
        
        heroSlideshow.style.backgroundImage = `url('${backdropPath}')`;
        slideshowTitle.textContent = item.title || item.name || 'Unknown Title'; // Use 'title' for movies, 'name' for TV shows
        slideshowDescription.textContent = item.overview ?
            // Truncate long descriptions
            (item.overview.length > 200 ? item.overview.substring(0, 197) + '...' : item.overview) :
            'No description available.';

        // Store current slide data for "Watch Now" button to link to details page
        slideshowWatchNowBtn.dataset.itemId = item.id;
        slideshowWatchNowBtn.dataset.itemType = item.media_type === 'tv' || item.first_air_date ? 'tv' : 'movie'; // Determine type for navigation
        const itemTitle = item.title || item.name || 'Unknown Title';
        slideshowWatchNowBtn.dataset.seoTitle = encodeURIComponent(itemTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-'));
    }

    /**
     * Advances the slideshow to the next slide in the `popularMoviesSlides` array.
     */
    function nextSlide() {
        currentSlideIndex = (currentSlideIndex + 1) % popularMoviesSlides.length;
        renderSlide(popularMoviesSlides[currentSlideIndex]);
    }

    /**
     * Starts the automatic slideshow interval. Clears any existing interval first.
     */
    function startSlideshow() {
        if (slideshowInterval) {
            clearInterval(slideshowInterval);
        }
        slideshowInterval = setInterval(nextSlide, SLIDESHOW_DURATION);
    }

    /**
     * Creates and appends a movie/TV show card to a given container.
     * Each card is wrapped in an anchor tag for navigation to a detail page.
     * @param {object} item - The movie or TV show object from TMDB.
     * @param {HTMLElement} container - The DOM element to append the card to.
     * @param {string} imageSize - The size of the poster image (e.g., 'w300', 'w500').
     */
    function createCard(item, container, imageSize = 'w300') {
        // Construct poster image URL, with a fallback if not available
        const posterPath = item.poster_path ? `${TMDB_IMAGE_BASE_URL}${imageSize}${item.poster_path}` : 'https://placehold.co/300x450/2d3748/e2e8f0?text=No+Poster';
        // Determine item type for the detail page link (movie or tv)
        const itemType = item.media_type === 'tv' || item.first_air_date ? 'tv' : 'movie';
        const itemId = item.id;
        const itemTitle = item.title || item.name || 'Unknown Title';
        const seoTitle = encodeURIComponent(itemTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-'));

        const cardLink = document.createElement('a');
        cardLink.href = `movie?title=${seoTitle}&id=${itemId}&type=${itemType}`; // Link to a generic movie/TV detail page and removed.html
        cardLink.classList.add('card'); // Apply card styling to the anchor tag
        cardLink.innerHTML = `
            <img src="${posterPath}" alt="${item.title || item.name || 'Poster'}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/300x450/2d3748/e2e8f0?text=No+Poster';" />
            <div class="card-title">${item.title || item.name || 'Unknown Title'}</div>
        `;
        container.appendChild(cardLink);
    }

    /**
     * Generic function to load content for a section (e.g., Trending, Popular),
     * handling the spinner loading state and rendering cards.
     * @param {string} endpoint - The TMDB API endpoint URL.
     * @param {HTMLElement} container - The DOM element to append cards to.
     * @param {string} type - 'movie' or 'tv' for fallback messages.
     */
    async function loadSectionInitial(endpoint, container, type = 'movie') {
        container.innerHTML = '<div class="spinner"></div>'; // Show spinner while loading

        // Construct the URL to your Cloudflare Worker, passing the TMDB path and query parameters
        const url = `${WORKER_BASE_URL}${endpoint}?language=en-US&page=1`; // <<<--- KEY CHANGE HERE
        const data = await fetchData(url);

        if (data && data.results && data.results.length > 0) {
            container.innerHTML = ''; // Clear spinner
            data.results.forEach(item => {
                createCard(item, container, 'w300');
            });
        } else {
            console.warn(`Could not fetch ${type} for ${endpoint} or no results found.`);
            container.innerHTML = `<p class="col-span-full text-center text-gray-400">Failed to load ${type}s.</p>`;
        }
    }

    // --- Event Listeners ---

    // Event listener for the slideshow "Watch Now" button
    slideshowWatchNowBtn.addEventListener('click', () => {
        const itemId = slideshowWatchNowBtn.dataset.itemId;
        const itemType = slideshowWatchNowBtn.dataset.itemType;
        const seoTitle = slideshowWatchNowBtn.dataset.seoTitle;
        if (itemId && itemType) {
            // Redirect to a detail page with the item ID and type
            window.location.href = `movie?title=${seoTitle}&id=${itemId}&type=${itemType}`; //removed .html
        } else {
            console.warn("No movie/TV show loaded for 'Watch Now' button.");
        }
    });

    // Event listener for the desktop search button click
    searchButton.addEventListener('click', performSearch);
    // Event listener for "Enter" key press in the desktop search input
    searchInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            performSearch();
        }
    });

    /**
     * Handles the search action for desktop, redirecting to a search results page.
     */
    function performSearch() {
        const query = searchInput.value.trim();
        if (query) {
            // Redirect to search.html with the query and selected type
            // The search.html page will also need to be updated to use the worker
            window.location.href = `search?query=${encodeURIComponent(query)}&category=${currentSearchType}`; //removed.html
        } else {
            // Log a message if the search query is empty
            console.log('Please enter a search query!');
        }
    }

    // Event listeners for desktop category changer buttons (Movies/TV Shows)
    browseButtons.forEach(button => {
        button.addEventListener('click', () => {
            // Remove 'active' class from all desktop buttons
            browseButtons.forEach(btn => btn.classList.remove('active'));
            // Add 'active' class to the clicked desktop button
            button.classList.add('active');
            // Update the current search type based on the button's data attribute
            currentSearchType = button.dataset.searchType;
            // Update the placeholder text of the desktop search input
            searchInput.placeholder = `Search ${currentSearchType === 'movie' ? 'movies' : 'TV shows'}...`;
        });
    });

    // --- Mobile Menu Functions ---

    /**
     * Toggles the mobile side menu and overlay visibility.
     */
    function toggleMenu() {
        sideMenu.classList.toggle('open');
        menuOverlay.classList.toggle('show');
    }

    /**
     * Handles the search action for the mobile menu, redirecting to a search results page.
     */
    function performMenuSearch() {
        const query = menuSearchInput.value.trim();
        if (query) {
            // The search.html page will also need to be updated to use the worker
            window.location.href = `search?query=${encodeURIComponent(query)}&category=${currentSearchType}`; //removed.html
            toggleMenu(); // Close menu after search
        } else {
            console.log('Please enter a search query in the mobile menu!');
        }
    }

    // Event listener for mobile menu search button click
    menuSearchButton.addEventListener('click', performMenuSearch);
    // Event listener for "Enter" key press in the mobile menu search input
    menuSearchInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            performMenuSearch();
        }
    });

    // Event listeners for mobile menu category changer buttons
    menuBrowseButtons.forEach(button => {
        button.addEventListener('click', () => {
            // Remove 'active' class from all mobile menu buttons
            menuBrowseButtons.forEach(btn => btn.classList.remove('active'));
            // Add 'active' class to the clicked mobile menu button
            button.classList.add('active');
            // Update the current search type based on the button's data attribute
            currentSearchType = button.dataset.searchType;
            // Update the placeholder text of the mobile menu search input
            menuSearchInput.placeholder = `Browse ${currentSearchType === 'movie' ? 'Movies' : 'TV Shows'}`;
        });
    });


    // --- Initialization Function ---
    /**
     * Initializes the homepage by fetching and rendering various content sections.
     */
    async function initializeHomepage() {
        // Fetch popular movies for the hero slideshow
        // Using WORKER_BASE_URL and relative path
        const popularMoviesData = await fetchData(`${WORKER_BASE_URL}${POPULAR_MOVIES_ENDPOINT}?language=en-US&page=1`); // <<<--- KEY CHANGE HERE
        if (popularMoviesData && popularMoviesData.results && popularMoviesData.results.length > 0) {
            popularMoviesSlides = popularMoviesData.results;
            renderSlide(popularMoviesSlides[currentSlideIndex]); // Render the first slide
            startSlideshow(); // Start automatic transitions
        } else {
            console.warn('Could not fetch popular movies for slideshow or no results found.');
            slideshowTitle.textContent = 'Failed to Load Movies';
            slideshowDescription.textContent = 'Please check your API key or network connection.';
            heroSlideshow.style.backgroundImage = 'url("https://placehold.co/1920x1080/1a202c/e2e8f0?text=Error")';
        }

        // Load initial content for all horizontal scroll sections
        // All calls now use the worker base URL
        loadSectionInitial(TRENDING_MOVIES_ENDPOINT, trendingMoviesGrid, 'movie');
        loadSectionInitial(POPULAR_MOVIES_ENDPOINT, popularMoviesContainer, 'movie');
        loadSectionInitial(TOP_RATED_MOVIES_ENDPOINT, topRatedMoviesContainer, 'movie');
        loadSectionInitial(POPULAR_TV_ENDPOINT, popularTvContainer, 'TV series');
        loadSectionInitial(TOP_RATED_TV_ENDPOINT, topRatedTvContainer, 'TV series');
        loadSectionInitial(NEW_RELEASES_ENDPOINT, newReleasesContainer, 'movie');

        // Initialize placeholder for mobile search input
        menuSearchInput.placeholder = `Browse ${currentSearchType === 'movie' ? 'Movies' : 'TV Shows'}`;
    }

    // --- Initial Page Load ---
    // Ensure the DOM is fully loaded before running the initialization function
    document.addEventListener('DOMContentLoaded', initializeHomepage);
</script>
